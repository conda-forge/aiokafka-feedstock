{% set name = "aiokafka" %}
{% set version = "0.13.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 7d634af3c8d694a37a6c8535c54f01a740e74cccf7cc189ecc4a3d64e31ce122

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv
  skip: true  # [win]

requirements:
  build:
    - python                                 # [build_platform != target_platform]
    - cross-python_{{ target_platform }}     # [build_platform != target_platform]
    - cython >=3.0.5                         # [build_platform != target_platform]
    - zlib                                   # [build_platform != target_platform]
    - {{ compiler('c') }}
    - {{ stdlib("c") }}
  host:
    - cython >=3.0.5
    - python
    - pip
    - setuptools
    - zlib
  run:
    - python
    - async-timeout
    - packaging
    - typing-extensions

test:
  imports:
    - aiokafka
  requires:
    - pip
  commands:
    - pip check

about:
  home: https://github.com/aio-libs/aiokafka
  license: Apache-2.0
  license_family: Apache
  license_file: LICENSE
  summary: asyncio client for Kafka

  description: |
    AIOKafkaProducer is a high-level, asynchronous message producer.
  dev_url: https://github.com/aio-libs/aiokafka

extra:
  recipe-maintainers:
    - timkpaine
